<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name  ="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Cloud Storage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>🆕 Create an Account</h2>
    <form id="signupForm">
  <input type="text" placeholder="Full Name" name="fullname" required />
  <input type="email" placeholder="Email" name="email" required />
  <input type="password" placeholder="Password" name="password" required />
  <input type="password" placeholder="Confirm Password" name="confirm_password" required />
  <button type="submit">Sign Up</button>
</form>

      <p style="margin-top: 1rem;">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </div>
  <script>
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const email = e.target.email.value;

// Email validation using regex
const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!emailPattern.test(email)) {
  alert("Email does not exist or is not valid!");
  return;
}
   const password = e.target.password.value;
    const confirm_password = e.target.confirm_password.value;
    if (password !== confirm_password) {
  alert("Passwords do not match!");
  return;

}

// Password strength validation (at least 8 characters, 
// one uppercase, one lowercase, one digit, one special character)
const passwordStrength =
  /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

if (!passwordStrength.test(password)) {
  alert("Password must be at least 8 characters and include uppercase, lowercase, digit, and special character.");
  return;
}

    const res = await fetch('http://localhost:5001/api/signup', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    if (res.ok) {
      alert('Signup successful! Please login.');
      window.location.href = 'login.html';
    } else {
      const data = await res.json();
      alert('Signup failed: ' + data.error);
    }
  } catch(err) {
    alert('Network error! ' + err.message);
  }
});
</script>
</body>
</html>
