<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Cloud Storage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
 <style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f1f5f9;
}

.container {
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 240px;
  height: 100vh;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  background: #2563eb;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 8px;
  font-size: 14px;
}

.sidebar button:hover {
  background: #1d4ed8;
}

/* Main */
.main {
  flex: 1;
  padding: 25px;
}

/* Topbar */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

/* Upload Box */
.upload-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0px 4px 12px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

.upload-box input {
  margin-right: 10px;
}

/* File Cards */
.file-card {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  box-shadow: 0px 2px 8px rgba(0,0,0,0.05);
}le

.file-card button {
  margin-left: 8px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.file-card button:first-child {
  background: #22c55e;
  color: white;
}

.file-card button:last-child {
  background: #ef4444;
  color: white;
}

/* Headings */
h2 {
  margin: 0;
}
</style>
 <div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>☁️ Cloud</h2>
 <button onclick="document.getElementById('fileInput').click()">⬆ Upload File</button>
    <button onclick="window.location.href='myfiles.html'">My Files</button>
    <button id="logoutBtn">Logout</button>
  </div>

  <!-- Main -->
  <div class="main">

  <div class="topbar">
  <h2>📁 My Dashboard</h2>
  <span>Welcome 👋</span>
</div>

    <!-- Upload Box -->
    <div class="upload-box">
      <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" id="fileInput" name="file" required>
        <button type="submit">Upload File</button>
      </form>
    </div>

    <!-- Info -->
<div style="text-align:center; margin-top:40px; color:gray;">
  <h3>No files uploaded yet 📂</h3>
  <p>Upload your first file to get started</p>
</div>

  </div>

</div>

  <script>
    // 🔐 Check login
if (!localStorage.getItem('token')) {
  alert("Please login first");
  window.location.href = "login.html";
}

const token = localStorage.getItem("token");
const API_BASE = "http://localhost:5001";

// 🔓 Logout
document.getElementById("logoutBtn").addEventListener("click", function () {
  localStorage.removeItem("token");
  window.location.href = "login.html";
});

// 📤 Upload file
document.getElementById('uploadForm').addEventListener('submit', async function (e) {
  e.preventDefault();

  const fileInput = e.target.file;
  const file = fileInput.files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch(`${API_BASE}/api/upload`, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token
      },
      body: formData
    });

    const data = await res.json();
    alert(data.message || data.error);

  } catch (err) {
    alert('Network error! ' + err.message);
  }
});</script>

  
</body>
</html>
