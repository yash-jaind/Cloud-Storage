<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Cloud Storage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Welcome to ☁️ Cloud Storage</h1>
      <p>Your secure files are just a click away.</p>

      <div class="options">
        <form id="uploadForm" enctype="multipart/form-data">
          <input type="file" name="file" required>
          <button type="submit">Upload File</button>
        </form>

        <a href="myfiles.html" class="btn">📂 My Files</a>
      <a href="#" id="logoutBtn" class="btn logout">🚪 Logout</a>
      </div>
    </div>
  </div>

  <script>
    if(!localStorage.getItem('userEmail')){
  alert("Please login first");
  window.location.href = "login.html";
}
    document.getElementById("logoutBtn").addEventListener("click", function(){
    localStorage.removeItem("userEmail");
    window.location.href = "login.html";
});
document.getElementById('uploadForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  // Get the file input element
  const fileInput = e.target.file;

  // Get user email from localStorage
  const email = localStorage.getItem('userEmail');

  // Prepare FormData
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  formData.append('userEmail', email);

  try {
    const res = await fetch('http://10.25.138.243:5000s/api/upload', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    alert(data.message || data.error);
  } catch(err) {
    alert('Network error! ' + err.message);
  }
});
</script>

  
</body>
</html>
