<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Files - Cloud Storage</title>
  <style>
   body {
  font-family: 'Segoe UI', Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(90deg, #e6f4fd 0%, #ebf9ff 100%);
}

.container {
  width: 100vw;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  flex-direction: column;
}

.card {
  width: 98vw;
  max-width: 1100px;
  background: #fff;
  padding: 1.4em 2.5% 2.2em 2.5%;
  margin: 2em auto;
  border-radius: 15px;
  box-shadow: 0 6px 42px #00bbff15;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-sizing: border-box;
  animation: fadeInCard 0.8s;
}
@keyframes fadeInCard {
  from { opacity: 0; transform: translateY(25px);}
  to   { opacity: 1;   transform: none;}
}

#controls {
  width: 100%;
  max-width: 800px;
  margin: 0 auto 18px auto;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  align-items: center;
}

#searchInput {
  flex: 1 1 200px;
  min-width: 140px;
  max-width: 420px;
  padding: 8px 13px;
  border-radius: 8px;
  border: 1px solid #aad;
  font-size: 1em;
  transition: box-shadow 0.2s;
}

#searchInput:focus {
  outline: none;
  box-shadow: 0 0 0 2px #4acbff6a;
}

.btn {
  font-size: 1em;
  padding: 0.82em 2.5em;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #39d 50%, #00a7ff 100%);
  color: #fff;
  cursor: pointer;
  box-shadow: 0 2px 10px #39d2;
  transition: transform 0.2s, box-shadow 0.2s, background 0.17s;
  margin: 0 0.3em;
  position: relative;
  overflow: hidden;
}
.btn:hover {
  background: #4acbff;
  transform: scale(1.03);
  box-shadow: 0 5px 16px #4acbff4c;
}

.btn:active::after {
  content: '';
  position: absolute;
  left: 50%; top: 50%;
  width: 105px; height: 105px;
  background: rgba(30, 128, 255, 0.18);
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(1);
  animation: ripple .7s ease;
}
@keyframes ripple {
  to { transform: translate(-50%, -50%) scale(2.3); opacity: 0; }
}

#fileDisplay {
  width: 100%;
  max-height: 420px; /* max table height, scrollable */
  overflow-y: auto;
  margin-top: 0;
  margin-bottom: 1.2em;
}

/* Table styles */
.file-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 1.2em;
  background: #fafdff;
  box-sizing: border-box;
  overflow-x: auto;
  opacity: 0;
  animation: fadeInTable 1.1s ease-in forwards;
}

@keyframes fadeInTable {
  to { opacity: 1; }
}

.file-table th,
.file-table td {
  border: 1px solid #c6ebff;
  padding: 11px 8px;
  text-align: left;
  min-width: 97px;
  vertical-align: middle;
  word-break: break-word;
  font-size: 1.05em;
  transition: background 0.28s;
}

.file-table th {
  background: linear-gradient(90deg, #ccedfc 0%, #e6f8ff 98%);
  font-weight: bold;
  font-size: 1.07em;
  letter-spacing: 0.5px;
}

.file-table tbody tr {
  transition: background 0.25s, transform 0.25s;
}
.file-table tbody tr:hover {
  background: #e6f4ff;
  box-shadow: 0 2px 12px #00a7ff33;
  transform: scale(1.014);
}

.file-preview {
  max-width: 66px;
  max-height: 66px;
  border-radius: 6px;
  box-shadow: 0 4px 14px #00a7ff17;
  display: block;
  margin: 0 auto;
  transition: transform 0.18s;
}
.file-preview:hover {
  transform: scale(1.10) rotate(-2deg);
}

/* For icons in table */
.file-table tbody td .icon {
  animation: popInIcon 0.33s;
}
@keyframes popInIcon {
  from { opacity: 0; transform: scale(0.55);}
  to   { opacity: 1; transform: scale(1);}
}

/* Responsive adjustments */
@media (max-width: 900px) {
  .card { max-width: 99vw; padding: 0.8em 1.2em 1.7em 1.2em;}
  #controls {max-width:99vw;}
  #searchInput {max-width:99vw;width:99vw;}
  .file-table th, .file-table td {font-size:0.98em;}
}
@media (max-width: 600px) {
  .card {padding: 0.32em 1vw 1.15em 1vw;}
  h2 {font-size: 1.08em;}
  #searchInput {font-size:0.99em;}
  .file-table th, .file-table td {font-size:0.93em;}
}
 </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>📂 My Files</h2>
      <div id="controls">
        <button id="showMyFilesBtn" class="btn">Show My Files</button>
        <input type="text" id="searchInput" placeholder="Search files..." />
        <button id="searchBtn" class="btn">Search</button>
      </div>
      <div id="fileDisplay"></div>
      <a href="welcome.html" class="btn" style="margin-top:18px;">🏠 Back to Dashboard</a>
    </div>
  </div>
    <script>
      if(!localStorage.getItem('userEmail')){
  alert("Please login first");
  window.location.href = "login.html";
}
      const API_BASE = "http://10.25.138.243:5000";
const userEmail = localStorage.getItem('userEmail');

function fileUrl(id, download=false){
  if(download){
    return `${API_BASE}/api/file/${id}?download=1&email=${userEmail}`;
  }
  return `${API_BASE}/api/file/${id}?email=${userEmail}`;
}
    class TrieNode {
      constructor() {
        this.children = {};
        this.files = new Set();
      }
    }

      class Trie {
        constructor() {
          this.root = new TrieNode();
        }
        insertSubstring(fileName, fileObj) {
          const lowerName = fileName.toLowerCase();
          for (let i = 0; i < lowerName.length; i++) {
            let node = this.root; 
            for (let j = i; j < lowerName.length; j++) {
              const char = lowerName[j];
              if (!node.children[char]) {
                node.children[char] = new TrieNode();
              }
              node = node.children[char];
              node.files.add(fileObj);
            }
          }
        }
        search(query) {
          const lowerQuery = query.toLowerCase();
          let node = this.root;
          for (const char of lowerQuery) {
            if (!node.children[char]) {
              return [];
            }
            node = node.children[char];
          }
          return Array.from(node.files);
        }
      }
      

      document.addEventListener('DOMContentLoaded', () => {
        const btn = document.getElementById('showMyFilesBtn');
          if (btn) btn.style.display = 'none';
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
          if (searchBtn) searchBtn.style.display = 'none';
        const displayDiv = document.getElementById('fileDisplay');
        let allFiles = [];
        let trie;

        async function loadFilesAndTrie() {
          const email = localStorage.getItem('userEmail');
          if (!email) {
            alert('Please login first.');
            return;
          }
          try {
            const response = await fetch(`http://10.25.138.243:5000/api/files?email=${email}`);
            if (!response.ok) throw new Error('Failed to fetch files');
            allFiles = await response.json();
            trie = new Trie();
            allFiles.forEach(file => trie.insertSubstring(file.originalname, file));
            renderFiles(allFiles);
          } catch (error) {
            alert('Error loading files: ' + error.message);
          }
        }

        function renderFiles(files) {
          displayDiv.innerHTML = '';
          if (!files.length) {
            displayDiv.innerHTML = '<p>No files found.</p>';
            return;
          }

          const table = document.createElement('table');
          table.className = 'file-table';

          const header = document.createElement('thead');
          header.innerHTML = `
            <tr>
              <th>Preview</th>
              <th>File Name</th>
              <th>File Type</th>
              <th>Upload Date</th>
              <th>View</th>
              <th>Download</th>
              <th>Delete</th>
            </tr>`;
          table.appendChild(header);

          const tbody = document.createElement('tbody');

          files.forEach(file => {
            const tr = document.createElement('tr');

            let previewHtml = '';
            if (file.contentType && file.contentType.startsWith('image')) {
              previewHtml = `<img src="${fileUrl(file._id)}" alt="Preview" class="file-preview"/>`;
            } else if (file.contentType && file.contentType.startsWith('text')) {
              previewHtml = '📄';
            } else {
              previewHtml = '📁';
            }

            const uploadDate = file.uploadDate ? new Date(file.uploadDate).toLocaleString() : '';
            let typeDisplay = 'Unknown';
            if (file.contentType) {
              if (file.contentType === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                typeDisplay = 'docx';
              } else if (file.contentType.startsWith('image')) {
                typeDisplay = 'Image';
              } else if (file.contentType.startsWith('text')) {
                typeDisplay = 'Text';
              } else {
                typeDisplay = file.contentType.split('/')[1].toUpperCase();
              }
            }

            tr.innerHTML = `
              <td>${previewHtml}</td>
              <td>${file.originalname}</td>
              <td>${typeDisplay}</td>
              <td>${uploadDate}</td>
            <td><a target="_blank" href="${fileUrl(file._id)}">View</a></td>
             <td><a href="${fileUrl(file._id, true)}" download="${file.originalname}">Download</a></td>
              <td><button class="delete-btn" data-id="${file._id}" style="color: red; cursor: pointer;">Delete</button></td>
            `;

            tbody.appendChild(tr);
          });

          table.appendChild(tbody);
          displayDiv.appendChild(table);

          // Attach delete button event listeners
          document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              const fileId = e.target.getAttribute('data-id');
              if (!confirm('Are you sure you want to delete this file?')) return;

              try {
                const response = await fetch(`${API_BASE}/api/files/${fileId}?email=${userEmail}`, {
                  method: 'DELETE',
                  headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error('Failed to delete file');

                allFiles = allFiles.filter(f => f._id !== fileId);
                renderFiles(allFiles);
              } catch (err) {
                alert(err.message);
              }
            });
          });
        }

        function performSearch() {
          const query = searchInput.value.trim();
          if (!query) {
            renderFiles(allFiles);
          } else {
            const matchedFiles = trie ? trie.search(query) : [];
            renderFiles(matchedFiles);
          }
        }

        btn.addEventListener('click', loadFilesAndTrie);
        searchInput.addEventListener('input', performSearch);
        searchBtn.addEventListener('click', performSearch);

        loadFilesAndTrie(); // initial load
      });
    </script>


  </body>
  </html>
